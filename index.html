<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lone Wolf Trading Group — Live Performance v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface-2: #f4f3f0;
    --border: rgba(11,11,11,0.10);
    --text: #0b0b0b;
    --text-2: #52514e;
    --text-3: #898781;
    --green: #1baf7a;
    --blue: #2a78d6;
    --amber: #eda100;
    --red: #e34948;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1a1a19;
      --surface-2: #222221;
      --border: rgba(255,255,255,0.10);
      --text: #ffffff;
      --text-2: #c3c2b7;
      --text-3: #898781;
    }
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .page { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* Header */
  .header { padding-bottom: 2rem; border-bottom: 0.5px solid var(--border); margin-bottom: 2rem; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); background: rgba(27,175,122,0.1); padding: 3px 10px; border-radius: 20px; font-weight: 500; margin-bottom: .75rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  h1 { font-size: 32px; font-weight: 600; line-height: 1.1; letter-spacing: -.02em; }
  .sub { font-size: 14px; color: var(--text-2); margin-top: .5rem; }
  .gh-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text-2); text-decoration: none; border: 0.5px solid var(--border); padding: 7px 14px; border-radius: var(--radius); background: var(--surface); transition: border-color .15s; white-space: nowrap; }
  .gh-btn:hover { border-color: var(--blue); color: var(--blue); }
  .gh-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* KPIs */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 2rem; }
  @media (max-width: 600px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  .kpi { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
  .kpi-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .kpi-value { font-size: 24px; font-weight: 600; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }

  /* Section */
  .sec { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin: 2rem 0 .875rem; }

  /* Chart */
  .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .chart-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1rem; }
  .chart-title { font-size: 14px; font-weight: 500; }
  .chart-range { font-size: 12px; color: var(--text-3); }
  .chart-wrap { position: relative; width: 100%; height: 200px; }

  /* Two col */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .875rem; }

  /* Bar rows */
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-lbl { font-size: 12px; color: var(--text-2); width: 58px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 5px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-val { font-size: 12px; font-weight: 500; min-width: 80px; text-align: right; }

  /* Regime */
  .regime-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .regime-row { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; border-bottom: 0.5px solid var(--border); }
  .regime-row:last-of-type { border-bottom: none; }
  .regime-name { font-size: 13px; font-weight: 500; }
  .regime-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .regime-right { text-align: right; }
  .regime-wr { font-size: 15px; font-weight: 600; }
  .regime-detail { font-size: 11px; color: var(--text-2); margin-top: 2px; }
  .pill { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-left: 6px; font-weight: 500; vertical-align: middle; }
  .pill-g { background: rgba(27,175,122,0.12); color: var(--green); }
  .pill-r { background: rgba(227,73,72,0.12); color: var(--red); }
  .insight { margin-top: .875rem; padding: .75rem 1rem; background: var(--surface-2); border-radius: var(--radius); border: 0.5px solid var(--border); font-size: 12px; color: var(--text-2); line-height: 1.6; }

  /* Disclaimer */
  .disclaimer { border-top: 0.5px solid var(--border); padding-top: 1.5rem; margin-top: 2rem; font-size: 11px; color: var(--text-3); line-height: 1.7; }
  .disclaimer a { color: var(--blue); text-decoration: none; }

  /* Today strip */
  .today-strip { margin-bottom: 2rem; }
  .today-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .6rem; display: flex; align-items: center; gap: 8px; }
  .today-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
  .today-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
  @media (max-width: 600px) { .today-grid { grid-template-columns: repeat(3, 1fr); } }
  .today-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .75rem 1rem; }
  .today-card-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .today-card-value { font-size: 18px; font-weight: 600; line-height: 1; }
  .today-card-sub { font-size: 10px; color: var(--text-3); margin-top: 3px; }
  .today-card.dll-warn { border-color: var(--amber); }
  .today-card.dll-danger { border-color: var(--red); }

  /* Loading */
  .loading { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }
  .error { text-align: center; padding: 3rem; color: var(--red); font-size: 13px; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="badge"><span class="dot"></span> Live funded account</div>
        <h1>LWTG MITS</h1>
        <div class="sub">Multi-Instrument Trading System · Apex Trader Funding · Micro futures</div>
      </div>
      <a class="gh-btn" href="https://github.com/lonewolftradinggroup-ai/lwtg-mits-system" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        View on GitHub
      </a>
    </div>
  </div>

  <div id="content" class="loading">Loading live data...</div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwYH4XspUne-iVKzmudb-ftTXsTkVjB_Z5lFl2niB1eqLU_NS_gEn6bHCu1fcxsh6rU/exec?action=tradelog';

async function loadData() {
  try {
    const resp = await fetch(GAS_URL, { cache: 'no-store' });
    const json = await resp.json();
    if (!json.trades || !json.trades.length) throw new Error('No trade data');
    render(json.trades);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error">Could not load live data. Check back shortly.</div>';
  }
}

function fmt(n) { return n >= 0 ? '+$' + n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}) : '-$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function pct(n) { return Math.round(n * 100) + '%'; }

function render(trades) {
  const closed = trades.filter(t => ['TP','SL','EOD'].includes(t.result));
  const total = closed.length;
  const wins = closed.filter(t => t.result === 'TP').length;
  const wr = wins / total;
  const netPnl = closed.reduce((s, t) => s + (t.pnl_usd || 0), 0);
  const grossWin = closed.filter(t => t.pnl_usd > 0).reduce((s,t) => s + t.pnl_usd, 0);
  const grossLoss = Math.abs(closed.filter(t => t.pnl_usd < 0).reduce((s,t) => s + t.pnl_usd, 0));
  const pf = grossLoss > 0 ? (grossWin / grossLoss).toFixed(2) : '∞';
  const mits = closed.filter(t => t.strategy === 'MITS').length;
  const qcs = closed.filter(t => t.strategy === 'QC Signals').length;

  // Session boundary = 17:00 CT (DLL resets here). Session bridges midnight.
  // Current session start: today at 17:00 CT if CT hour >= 17, else yesterday 17:00 CT.
  const nowCT = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  const sessionStart = new Date(nowCT);
  if (nowCT.getHours() >= 17) {
    sessionStart.setHours(17, 0, 0, 0);
  } else {
    sessionStart.setDate(sessionStart.getDate() - 1);
    sessionStart.setHours(17, 0, 0, 0);
  }
  // t.date = 'YYYY-MM-DD', t.time = 'HH:MM:SS' stored in CT per sheet timezone
  function tradeCTDate(t) {
    return new Date(t.date + 'T' + (t.time || '00:00:00'));
  }
  const sessionTrades = closed.filter(t => tradeCTDate(t) >= sessionStart);
  const sessionLabel = sessionStart.toLocaleDateString('en-US', { timeZone: 'America/Chicago', month: 'short', day: 'numeric' }) + ' 5pm – now';
  const sessionPnl = sessionTrades.reduce((s, t) => s + (t.pnl_usd || 0), 0);
  const sessionWins = sessionTrades.filter(t => t.result === 'TP').length;
  const sessionCount = sessionTrades.length;
  const sessionWR = sessionCount > 0 ? Math.round(sessionWins / sessionCount * 100) : null;
  const sessionContracts = sessionTrades.reduce((s, t) => s + (t.contracts || 1), 0);
  const sessionFees = sessionContracts * 1.90;
  const sessionNet = sessionPnl - sessionFees;
  const DLL_GATE = -750;
  const dllRemaining = DLL_GATE - sessionPnl;
  const dllClass = sessionPnl <= -500 ? 'dll-danger' : sessionPnl <= -300 ? 'dll-warn' : '';
  const dllColor = sessionPnl <= -500 ? 'var(--red)' : sessionPnl <= -300 ? 'var(--amber)' : 'var(--green)';

  const dates = [...new Set(closed.map(t => t.date))].sort();
  const firstDate = dates[0];
  const lastDate = dates[dates.length - 1];

  const dailyMap = {};
  closed.forEach(t => { dailyMap[t.date] = (dailyMap[t.date] || 0) + (t.pnl_usd || 0); });
  let cum = 0;
  const equityLabels = [], equityData = [];
  dates.forEach(d => { cum += (dailyMap[d] || 0); equityLabels.push(d.slice(5).replace('-', '/')); equityData.push(Math.round(cum)); });

  const byInst = {};
  closed.filter(t => t.strategy === 'MITS').forEach(t => {
    if (!byInst[t.symbol]) byInst[t.symbol] = {w:0,l:0,pnl:0};
    byInst[t.symbol].pnl += (t.pnl_usd || 0);
    if (t.result === 'TP') byInst[t.symbol].w++; else byInst[t.symbol].l++;
  });

  const byPreset = {};
  closed.filter(t => t.strategy === 'QC Signals').forEach(t => {
    const k = t.timeframe || 'Other';
    if (!byPreset[k]) byPreset[k] = {w:0,l:0,pnl:0};
    byPreset[k].pnl += (t.pnl_usd || 0);
    if (t.result === 'TP') byPreset[k].w++; else byPreset[k].l++;
  });

  const withRegime = closed.filter(t => t.strategy === 'MITS' && t.regime_score !== null && t.regime_score !== undefined && t.regime_score !== 0 && t.direction);
  const aligned = withRegime.filter(t => (t.regime_score > 0 && t.direction === 'long') || (t.regime_score < 0 && t.direction === 'short'));
  const counter = withRegime.filter(t => (t.regime_score > 0 && t.direction === 'short') || (t.regime_score < 0 && t.direction === 'long'));
  const alignedPnl = aligned.reduce((s,t) => s + (t.pnl_usd||0), 0);
  const counterPnl = counter.reduce((s,t) => s + (t.pnl_usd||0), 0);
  const alignedW = aligned.filter(t => t.result==='TP').length;
  const counterW = counter.filter(t => t.result==='TP').length;

  const instOrder = ['MES','MNQ','MGC','M2K'];
  const maxInstPnl = Math.max(...instOrder.map(s => byInst[s] ? Math.abs(byInst[s].pnl) : 0));

  const presetOrder = Object.entries(byPreset).sort((a,b) => b[1].pnl - a[1].pnl);
  const maxPresetPnl = Math.max(...presetOrder.map(p => Math.abs(p[1].pnl)));

  const formatDate = d => {
    const [y,m,day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(m)-1] + ' ' + parseInt(day);
  };

  document.getElementById('content').innerHTML = `
    <div class="today-strip">
      <div class="today-label"><span class="today-dot"></span> Session — ${sessionLabel}</div>
      <div class="today-grid">
        <div class="today-card">
          <div class="today-card-label">P&L Gross</div>
          <div class="today-card-value" style="color:${sessionPnl >= 0 ? 'var(--green)' : 'var(--red)'}">${sessionCount > 0 ? fmt(Math.round(sessionPnl)) : '—'}</div>
          <div class="today-card-sub">pre-commission</div>
        </div>
        <div class="today-card">
          <div class="today-card-label">Net After Fees</div>
          <div class="today-card-value" style="color:${sessionNet >= 0 ? 'var(--green)' : 'var(--red)'}">${sessionCount > 0 ? fmt(Math.round(sessionNet)) : '—'}</div>
          <div class="today-card-sub">~$1.90/contract RT</div>
        </div>
        <div class="today-card">
          <div class="today-card-label">Win Rate</div>
          <div class="today-card-value">${sessionWR !== null ? sessionWR + '%' : '—'}</div>
          <div class="today-card-sub">${sessionCount > 0 ? sessionWins + 'W · ' + (sessionCount - sessionWins) + 'L' : 'no trades yet'}</div>
        </div>
        <div class="today-card">
          <div class="today-card-label">Trades</div>
          <div class="today-card-value">${sessionCount}</div>
          <div class="today-card-sub">MITS ${sessionTrades.filter(t=>t.strategy==='MITS').length} · QCS ${sessionTrades.filter(t=>t.strategy==='QC Signals').length}</div>
        </div>
        <div class="today-card ${dllClass}">
          <div class="today-card-label">Session P&L</div>
          <div class="today-card-value" style="color:${dllColor}">${sessionCount > 0 ? fmt(Math.round(sessionPnl)) : '—'}</div>
          <div class="today-card-sub">${sessionCount > 0 ? fmt(Math.round(Math.abs(dllRemaining))) + ' to -$750 block' : 'DLL gate: -$750'}</div>
        </div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Net P&L</div><div class="kpi-value" style="color:var(--green)">${fmt(Math.round(netPnl))}</div><div class="kpi-sub">gross, pre-commission</div></div>
      <div class="kpi"><div class="kpi-label">Win rate</div><div class="kpi-value">${(wr*100).toFixed(1)}%</div><div class="kpi-sub">${wins}W · ${total-wins}L</div></div>
      <div class="kpi"><div class="kpi-label">Trades</div><div class="kpi-value">${total}</div><div class="kpi-sub">MITS ${mits} · QCS ${qcs}</div></div>
      <div class="kpi"><div class="kpi-label">Profit factor</div><div class="kpi-value">${pf}</div><div class="kpi-sub">gross wins ÷ losses</div></div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Equity curve</div>
        <div class="chart-range">${formatDate(firstDate)} – ${formatDate(lastDate)}</div>
      </div>
      <div class="chart-wrap"><canvas id="eqChart" role="img" aria-label="Line chart of cumulative P&L over the trading period. Starts positive, dips on Jun 24, then rises to peak before ending at ${fmt(Math.round(netPnl))}.">Cumulative P&L trajectory from ${formatDate(firstDate)} to ${formatDate(lastDate)}.</canvas></div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">MITS by instrument</div>
        ${instOrder.filter(s => byInst[s]).map(s => {
          const d = byInst[s]; const t2 = d.w + d.l; const w2 = t2 > 0 ? Math.round(d.w/t2*100) : 0;
          const pct2 = maxInstPnl > 0 ? Math.max(8, Math.round(Math.abs(d.pnl)/maxInstPnl*100)) : 8;
          const col = d.pnl >= 0 ? 'var(--blue)' : 'var(--red)';
          return `<div class="bar-row"><div class="bar-lbl">${s}</div><div class="bar-track"><div class="bar-fill" style="width:${pct2}%;background:${col}"></div></div><div class="bar-val" style="color:${col}">${w2}% · ${fmt(Math.round(d.pnl))}</div></div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title">QC Signals by preset</div>
        ${presetOrder.map(([k, d]) => {
          const t2 = d.w + d.l; const w2 = t2 > 0 ? Math.round(d.w/t2*100) : 0;
          const pct2 = maxPresetPnl > 0 ? Math.max(8, Math.round(Math.abs(d.pnl)/maxPresetPnl*100)) : 8;
          const col = d.pnl >= 0 ? 'var(--green)' : 'var(--red)';
          return `<div class="bar-row"><div class="bar-lbl" style="width:68px">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct2}%;background:${col}"></div></div><div class="bar-val" style="color:${col}">${w2}% · ${fmt(Math.round(d.pnl))}</div></div>`;
        }).join('')}
      </div>
    </div>

    <div class="regime-card">
      <div class="card-title">Regime alignment — the primary edge</div>
      <div class="regime-row">
        <div><div class="regime-name">Aligned trades <span class="pill pill-g">with the market</span></div><div class="regime-desc">Regime score supports trade direction</div></div>
        <div class="regime-right"><div class="regime-wr" style="color:var(--green)">${aligned.length > 0 ? Math.round(alignedW/aligned.length*100) : 0}% WR</div><div class="regime-detail">${alignedW}W ${aligned.length - alignedW}L · ${fmt(Math.round(alignedPnl))}</div></div>
      </div>
      <div class="regime-row">
        <div><div class="regime-name">Counter-regime <span class="pill pill-r">against the market</span></div><div class="regime-desc">Regime score opposes trade direction</div></div>
        <div class="regime-right"><div class="regime-wr" style="color:var(--red)">${counter.length > 0 ? Math.round(counterW/counter.length*100) : 0}% WR</div><div class="regime-detail">${counterW}W ${counter.length - counterW}L · ${fmt(Math.round(counterPnl))}</div></div>
      </div>
      <div class="insight">The regime gate is the system's primary edge. Aligned trades account for ${fmt(Math.round(alignedPnl))} gross profit. Counter-regime trades account for ${fmt(Math.round(Math.abs(counterPnl)))} of losses. The gate that blocks counter-regime entries is the single highest-value feature in MITS.</div>
    </div>

    <div class="disclaimer">
      Live funded account results — Apex Trader Funding via Tradovate, micro futures. P&L is gross before commissions and exchange fees (~$1.90 round-trip per contract). Past performance does not guarantee future results. Not financial advice.<br><br>
      <a href="https://github.com/lonewolftradinggroup-ai/lwtg-mits-system">View system on GitHub →</a>
    </div>
  `;

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gridCol = isDark ? '#2c2c2a' : '#e1e0d9';
  const tickCol = isDark ? '#898781' : '#898781';

  new Chart(document.getElementById('eqChart'), {
    type: 'line',
    data: {
      labels: equityLabels,
      datasets: [{
        data: equityData,
        borderColor: '#2a78d6',
        backgroundColor: isDark ? 'rgba(42,120,214,0.06)' : 'rgba(42,120,214,0.07)',
        borderWidth: 2,
        fill: true,
        tension: 0.35,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: '#2a78d6',
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' Cumulative: ' + (ctx.parsed.y >= 0 ? '+$' : '-$') + Math.abs(ctx.parsed.y).toLocaleString()
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: tickCol, font: { size: 10 }, maxRotation: 35, autoSkip: true, maxTicksLimit: 10 } },
        y: { grid: { color: gridCol }, ticks: { color: tickCol, callback: v => (v >= 0 ? '+$' : '-$') + Math.abs(v/1000).toFixed(1) + 'k' } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
